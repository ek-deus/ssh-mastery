---
# Управление authorized_keys

- name: Ensure authorized_keys file exists
  ansible.builtin.file:
    path: "{{ ssh_dir }}/authorized_keys"
    state: touch
    owner: "{{ ssh_user }}"
    group: "{{ ssh_group }}"
    mode: "0600"
  when: ssh_authorized_keys | length > 0

- name: Deploy authorized_keys
  ansible.posix.authorized_key:
    user: "{{ ssh_user }}"
    state: present
    key: "{{ item }}"
    exclusive: true  # Заменяет все существующие ключи
    manage_dir: false  # Мы уже управляем правами отдельно
  loop: "{{ ssh_authorized_keys }}"
  loop_control:
    label: "{{ item[:30] }}..."
