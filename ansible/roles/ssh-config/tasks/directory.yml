---
# Создание и настройка директорий SSH

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ ssh_dir }}"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_group }}"
    mode: "0700"

- name: Ensure config.d directory exists
  ansible.builtin.file:
    path: "{{ ssh_config_dir }}"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_group }}"
    mode: "0700"
  when: ssh_manage_config_d

- name: Ensure sockets directory exists (for multiplexing)
  ansible.builtin.file:
    path: "{{ ssh_sockets_dir }}"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_group }}"
    mode: "0700"
  when: ssh_global_config.ControlMaster is defined

- name: Ensure backups directory exists
  ansible.builtin.file:
    path: "{{ ssh_dir }}/backups"
    state: directory
    owner: "{{ ssh_user }}"
    group: "{{ ssh_group }}"
    mode: "0700"
