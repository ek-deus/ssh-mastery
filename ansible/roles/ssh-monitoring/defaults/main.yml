---
ssh_monitoring_metrics_dir: /var/lib/node_exporter/textfile_collector
ssh_monitoring_log_source: journal  # journal или file
ssh_monitoring_log_file: /var/log/auth.log
ssh_monitoring_lookback_minutes: 5
ssh_monitoring_geoip_enabled: false
ssh_monitoring_brute_force_threshold: 10
ssh_monitoring_whitelist_ips: []
ssh_monitoring_deploy_prometheus_rules: true
ssh_monitoring_collector_interval: "*:0/1"  # каждую минуту
