# Добавить в scrape_configs вашего prometheus.yml
scrape_configs:
  # ... ваши существующие конфиги ...
  
  # SSH метрики через node_exporter (textfile_collector)
  - job_name: 'node_with_ssh'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          collector: 'ssh-metrics'
    file_sd_configs:
      - files:
        - '/etc/prometheus/targets/ssh_hosts.yml'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
  
  # Отдельный job для SSH-метрик (если хотите изолировать)
  - job_name: 'ssh_metrics'
    static_configs:
      - targets: ['localhost:9100']
    metrics_path: /metrics
    scrape_interval: 60s
    scrape_timeout: 30s
